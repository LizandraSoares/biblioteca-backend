openapi: 3.0.0

info:
  title: Biblioteca Virtual API
  version: 1.0.0
  description: API CRUD de Biblioteca Virtual

servers:
  - url: https://biblioteca-backend-six.vercel.app

tags:
  - name: Books
    description: Operações relacionadas aos livros

paths:
  /:
    get:
      summary: Verifica se a API está funcionando
      responses:
        '200':
          description: API funcionando

  /books:
    get:
      tags:
        - Books
      summary: Lista todos os livros
      responses:
        '200':
          description: Lista de livros retornada com sucesso

    post:
      tags:
        - Books
      summary: Cria um novo livro

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - title
                - author

              properties:
                title:
                  type: string

                author:
                  type: string

                category:
                  type: string

                year:
                  type: integer

                description:
                  type: string

                status:
                  type: string

      responses:
        '201':
          description: Livro criado com sucesso

  /books/{id}:
    get:
      tags:
        - Books
      summary: Busca um livro pelo ID

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

      responses:
        '200':
          description: Livro encontrado

    put:
      tags:
        - Books
      summary: Atualiza um livro

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                title:
                  type: string

                author:
                  type: string

                category:
                  type: string

                year:
                  type: integer

                description:
                  type: string

                status:
                  type: string

      responses:
        '200':
          description: Livro atualizado

    delete:
      tags:
        - Books
      summary: Remove um livro

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

      responses:
        '200':
          description: Livro removido